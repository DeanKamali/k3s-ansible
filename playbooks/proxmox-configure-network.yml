---
- name: Configure network for cloned VMs using cloud-init
  hosts: localhost
  gather_facts: false
  connection: local

  pre_tasks:
    - name: Load Proxmox variables from inventory
      set_fact:
        proxmox_host: "{{ hostvars[groups['k3s_cluster'][0]]['proxmox_host'] }}"
        proxmox_node: "{{ hostvars[groups['k3s_cluster'][0]]['proxmox_node'] }}"
        proxmox_user: "{{ hostvars[groups['k3s_cluster'][0]]['proxmox_user'] }}"
        proxmox_password: "{{ hostvars[groups['k3s_cluster'][0]]['proxmox_password'] }}"
        proxmox_validate_certs: "{{ hostvars[groups['k3s_cluster'][0]]['proxmox_validate_certs'] }}"

    - name: Generate VM list from inventory
      set_fact:
        vms_to_configure: "{{ vms_to_configure | default([]) + [{'name': item, 'ip': hostvars[item]['ansible_host']}] }}"
      loop: "{{ groups['k3s_cluster'] | default([]) }}"
      when: 
        - item is defined
        - hostvars[item]['ansible_host'] is defined

  tasks:
    - name: Check if proxmoxer is installed
      command: python3 -c "import proxmoxer"
      register: proxmoxer_check
      changed_when: false
      failed_when: false

    - name: Install proxmoxer Python library
      pip:
        name: proxmoxer
        state: present
      when: proxmoxer_check.rc != 0

    - name: Configure cloud-init network for each VM
      shell: |
        python3 << 'PYTHON_EOF'
        from proxmoxer import ProxmoxAPI
        import sys
        
        try:
            proxmox = ProxmoxAPI('{{ proxmox_host }}', user='{{ proxmox_user }}', password='{{ proxmox_password }}', verify_ssl={{ 'True' if proxmox_validate_certs else 'False' }})
            node = '{{ proxmox_node }}'
            vm_name = '{{ item.name }}'
            vm_ip = '{{ item.ip }}'
            
            # Find VM by name
            vms = proxmox.nodes(node).qemu.get()
            vmid = None
            for vm in vms:
                if vm['name'] == vm_name:
                    vmid = vm['vmid']
                    break
            
            if not vmid:
                print(f"VM {vm_name} not found")
                sys.exit(1)
            
            # Configure cloud-init with IP
            proxmox.nodes(node).qemu(vmid).config.put(
                ipconfig0=f"ip={vm_ip}/24,gw=10.10.0.1"
            )
            
            print(f"Configured {vm_name} (VMID: {vmid}) with IP {vm_ip}/24")
            
        except Exception as e:
            print(f"Error: {e}", file=sys.stderr)
            sys.exit(1)
        PYTHON_EOF
      loop: "{{ vms_to_configure }}"
      register: network_config_results

    - name: Reboot VMs to apply network configuration
      community.general.proxmox_kvm:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        name: "{{ item.name }}"
        node: "{{ proxmox_node }}"
        state: restarted
      loop: "{{ vms_to_configure }}"
      ignore_errors: true

    - name: Wait for VMs to come back online
      wait_for:
        host: "{{ item.ip }}"
        port: 22
        delay: 10
        timeout: 300
      loop: "{{ vms_to_configure }}"
      ignore_errors: true

    - name: Display configuration summary
      debug:
        msg: |
          Network Configuration Summary:
          {% for vm in vms_to_configure %}
          - {{ vm.name }}: {{ vm.ip }}/24
          {% endfor %}

