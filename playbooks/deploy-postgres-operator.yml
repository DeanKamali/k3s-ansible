---
- name: Deploy Zalando Postgres Operator and MinIO for backups
  hosts: test-server-1
  gather_facts: false
  become: true

  vars:
    minio_namespace: minio
    minio_release_name: minio
    minio_access_key: minioadmin
    minio_secret_key: minioadmin123
    postgres_operator_version: v1.13.0
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml

  tasks:
    - name: Install required packages
      apt:
        name:
          - git
          - curl
          - python3-openshift
          - python3-kubernetes
        state: present
        update_cache: false

    - name: Install Helm
      shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Add MinIO Helm repository
      kubernetes.core.helm_repository:
        name: minio
        repo_url: https://charts.min.io/
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Deploy MinIO using Helm
      kubernetes.core.helm:
        name: "{{ minio_release_name }}"
        chart_ref: minio/minio
        release_namespace: "{{ minio_namespace }}"
        create_namespace: true
        wait: true
        wait_timeout: 10m
        kubeconfig: "{{ kubeconfig_path }}"
        values:
          rootUser: "{{ minio_access_key }}"
          rootPassword: "{{ minio_secret_key }}"
          persistence:
            size: 50Gi
            storageClass: local-path
          mode: standalone

    - name: Deploy Postgres Operator
      shell: |
        kubectl apply -k github.com/zalando/postgres-operator/manifests?ref={{ postgres_operator_version }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Create S3 credentials secret
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig_path }}"
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: postgres-backup-s3-credentials
            namespace: default
          type: Opaque
          stringData:
            AWS_ACCESS_KEY_ID: "{{ minio_access_key }}"
            AWS_SECRET_ACCESS_KEY: "{{ minio_secret_key }}"

    - name: Display status
      shell: |
        echo "=== MinIO ==="
        kubectl get pods -n {{ minio_namespace }}
        echo ""
        echo "=== Postgres Operator ==="
        kubectl get pods -l app.kubernetes.io/name=postgres-operator -A
        echo ""
        echo "Access MinIO: kubectl port-forward -n {{ minio_namespace }} svc/{{ minio_release_name }}-console 9001:9001"
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: status

    - name: Show status
      debug:
        var: status.stdout_lines
